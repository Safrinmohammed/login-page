<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./output.css" rel="stylesheet">
</head>

<body class="bg-gradient-to-r from-purple-400 to-purple-200 h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-5xl bg-white rounded-2xl shadow-2xl overflow-hidden grid md:grid-cols-2">

        
        <div class=" hidden md:flex bg-[url('/src/assets/img/mountain.jpg')] bg-cover  brightness-100">

            <div class=" flex flex-col items-center justify-center text-center px-8 text-white">
                
                    <h1 class="text-5xl font-bold mb-4">Welcome</h1>

                    <p class="text-lg">Lorem ipsum dolor sit amet consectetur adipisicing elit. Tempora ullam repellat molestias sed velit molestiae officiis architecto esse, eum dolores.<a href=" " class="text-purple-300 font-semibold">lorem more</a> </p>
                </div>
            </div>
        
        
                    
        
        <div class="p-10">
            <h2 class="text-4xl font-semibold mb-2">Register</h2>

            <p class="text-gray-500 mb-8">
                Create your account. It's free and only take a minute
            </p>

            <form class="space-y-5">

                <div class="grid grid-cols-2 gap-4">
                    <input type="text" placeholder="First Name" class="border-1 border-gray-300 px-4 py-3 rounded-xl ">

                    <input type="text" placeholder="Last Name" class="border border-gray-300 px-4 py-3 rounded-xl ">
                </div>


                <input type="email" placeholder="Email" class="w-full border border-gray-300 px-4 py-3 rounded-xl ">

                <input type="password" placeholder="Password" class="w-full border border-gray-300 px-4 py-3 rounded-xl ">

                <input type="password" placeholder="Confirm Password" class="w-full border border-gray-300 px-4 py-3 rounded-xl ">
                

                <label class="flex items-center gap-2 text-sm text-gray-600">
                    <input type="checkbox" class="accent-purple-500">
                    I accept the
                    <span class="text-purple-500">
                        Terms of Use & Privacy Policy
                    </span>
                </label>

                <button
                    class="w-full bg-purple-400 hover:bg-purple-500 text-white font-semibold py-3 rounded transition">
                    Register Now
                </button>

            </form>
        </div>

    </div>

</body>

</html>
